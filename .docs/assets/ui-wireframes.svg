<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08080c"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(22,22,26,0.72)"/>
      <stop offset="1" stop-color="rgba(15,15,18,0.52)"/>
    </linearGradient>
    <linearGradient id="hologram" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(0,229,255,0.14)"/>
      <stop offset="1" stop-color="rgba(0,229,255,0.04)"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="rgba(0,229,255,0.08)" stroke-width="1"/>
    </pattern>
    <mask id="panelClip">
      <rect x="0" y="0" width="1800" height="1000" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1800" height="1000" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="250" x2="1800" y2="250"/>
    <line x1="0" y1="500" x2="1800" y2="500"/>
    <line x1="0" y1="750" x2="1800" y2="750"/>
    <line x1="450" y1="0" x2="450" y2="1000"/>
    <line x1="900" y1="0" x2="900" y2="1000"/>
    <line x1="1350" y1="0" x2="1350" y2="1000"/>
  </g>

  <!-- Panel 1: Spatial Console + HUD -->
  <g transform="translate(60,60)">
    <rect width="780" height="410" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <text x="30" y="44" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="18" font-weight="500">1. Spatial HUD &amp; Console</text>

    <!-- HUD -->
    <rect x="140" y="80" width="500" height="48" rx="24" fill="url(#glass)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="140" y="80" width="500" height="48" rx="24" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1" opacity="0.6"/>
    <text x="172" y="110" fill="#00e5ff" font-family="SF Mono, monospace" font-size="13" filter="url(#glow)">UNIVERSE</text>
    <text x="350" y="110" fill="#f2f4f8" font-family="Songti SC, serif" font-size="15">城市能源状态：Calm</text>
    <text x="540" y="110" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="12">CPU 12%  MEM 34%</text>

    <!-- Console -->
    <rect x="190" y="290" width="400" height="64" rx="32" fill="url(#glass)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="190" y="290" width="400" height="64" rx="32" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Console icons -->
    <g transform="translate(230,322)">
      <circle r="14" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <circle r="4" fill="#5c6070"/>
    </g>
    <g transform="translate(290,322)">
      <circle r="14" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <rect x="-5" y="-5" width="10" height="10" fill="none" stroke="#5c6070" stroke-width="1.5"/>
    </g>
    <g transform="translate(350,322)">
      <circle r="14" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>
      <circle r="18" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
      <path d="M-4 0 L4 0 M0 -4 L0 4" stroke="#00e5ff" stroke-width="2"/>
    </g>
    <g transform="translate(410,322)">
      <circle r="14" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <path d="M-6 0 L6 0 M0 -6 L0 6" stroke="#5c6070" stroke-width="1.5"/>
    </g>
    <g transform="translate(470,322)">
      <circle r="14" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <path d="M-6 4 Q0 -8 6 4" fill="none" stroke="#5c6070" stroke-width="1.5"/>
    </g>
    <g transform="translate(530,322)">
      <circle r="14" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <circle r="5" fill="none" stroke="#5c6070" stroke-width="1.5"/>
      <circle r="2" fill="#5c6070"/>
    </g>

    <!-- Hint text -->
    <text x="390" y="385" fill="#5c6070" font-family="SF Mono, monospace" font-size="11" text-anchor="middle">Hover bottom edge to reveal</text>
  </g>

  <!-- Panel 2: Enter Building -->
  <g transform="translate(960,60)">
    <rect width="780" height="410" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <text x="30" y="44" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="18" font-weight="500">2. Enter a Building</text>

    <!-- Building -->
    <path d="M220 320 L260 100 L300 320 Z" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1.5" filter="url(#softGlow)"/>
    <path d="M220 320 L260 100 L300 320" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
    <line x1="260" y1="100" x2="260" y2="320" stroke="rgba(255,255,255,0.10)"/>

    <!-- Energy link from building to panel -->
    <path d="M300 220 C360 220 380 180 420 180" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6 4" filter="url(#glow)"/>

    <!-- Detail panel growing from building -->
    <rect x="420" y="120" width="280" height="220" rx="12" fill="url(#glass)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="420" y="120" width="280" height="220" rx="12" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="1"/>
    <text x="450" y="160" fill="#f2f4f8" font-family="Songti SC, serif" font-size="18">chrome.exe</text>
    <text x="450" y="185" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="12">PID 12844 · 14m uptime</text>

    <line x1="450" y1="210" x2="670" y2="210" stroke="rgba(255,255,255,0.08)"/>

    <text x="450" y="240" fill="#a0a4b0" font-family="Inter, sans-serif" font-size="12">CPU</text>
    <text x="670" y="240" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="14" text-anchor="end">32.4%</text>
    <rect x="450" y="250" width="220" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="450" y="250" width="140" height="4" rx="2" fill="#00e5ff" filter="url(#glow)"/>

    <text x="450" y="285" fill="#a0a4b0" font-family="Inter, sans-serif" font-size="12">Memory</text>
    <text x="670" y="285" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="14" text-anchor="end">1.2 GB</text>
    <rect x="450" y="295" width="220" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="450" y="295" width="95" height="4" rx="2" fill="#4aa8ff"/>

    <text x="450" y="330" fill="#a0a4b0" font-family="Inter, sans-serif" font-size="12">Threads</text>
    <text x="670" y="330" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="14" text-anchor="end">47</text>
  </g>

  <!-- Panel 3: Utility Console -->
  <g transform="translate(60,530)">
    <rect width="780" height="410" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <text x="30" y="44" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="18" font-weight="500">3. Utility Console</text>

    <!-- Console panel -->
    <rect x="60" y="80" width="320" height="300" rx="14" fill="url(#glass)" stroke="rgba(255,255,255,0.10)"/>

    <!-- Tabs -->
    <rect x="80" y="100" width="52" height="28" rx="6" fill="rgba(0,229,255,0.12)" stroke="#00e5ff" stroke-width="1"/>
    <text x="106" y="119" fill="#00e5ff" font-family="SF Mono, monospace" font-size="11" text-anchor="middle">CPU</text>
    <rect x="142" y="100" width="70" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="177" y="119" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="11" text-anchor="middle">Memory</text>
    <rect x="222" y="100" width="70" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="257" y="119" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="11" text-anchor="middle">Network</text>

    <!-- Search -->
    <rect x="80" y="140" width="280" height="32" rx="6" fill="rgba(0,0,0,0.25)" stroke="rgba(0,229,255,0.30)" stroke-width="1"/>
    <text x="96" y="161" fill="#5c6070" font-family="Inter, sans-serif" font-size="12">Search process...</text>

    <!-- Process strips -->
    <g transform="translate(80,190)">
      <rect width="280" height="40" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(0,229,255,0.35)"/>
      <rect x="12" y="12" width="16" height="16" rx="3" fill="#00e5ff" filter="url(#glow)"/>
      <text x="40" y="19" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="13">chrome.exe</text>
      <text x="40" y="33" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="10">PID 12844 · 32.4%</text>
      <text x="260" y="25" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="13" text-anchor="end">32.4%</text>
    </g>
    <g transform="translate(80,238)">
      <rect width="280" height="40" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
      <rect x="12" y="12" width="16" height="16" rx="3" fill="#4aa8ff"/>
      <text x="40" y="19" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="13">Code.exe</text>
      <text x="40" y="33" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="10">PID 9821 · 18.1%</text>
      <text x="260" y="25" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="13" text-anchor="end">18.1%</text>
    </g>
    <g transform="translate(80,286)">
      <rect width="280" height="40" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
      <rect x="12" y="12" width="16" height="16" rx="3" fill="#9090a0"/>
      <text x="40" y="19" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="13">explorer.exe</text>
      <text x="40" y="33" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="10">PID 4420 · 4.2%</text>
      <text x="260" y="25" fill="#f2f4f8" font-family="SF Mono, monospace" font-size="13" text-anchor="end">4.2%</text>
    </g>

    <!-- World hint -->
    <text x="440" y="220" fill="#5c6070" font-family="Inter, sans-serif" font-size="13">Hover row → world building pulses</text>
    <path d="M420 210 L390 210" stroke="#5c6070" stroke-width="1" marker-end="url(#arrow)"/>
  </g>

  <!-- Panel 4: Observer Panel -->
  <g transform="translate(960,530)">
    <rect width="780" height="410" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <text x="30" y="44" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="18" font-weight="500">4. Observer / AI Insight</text>

    <!-- Holographic panel -->
    <rect x="420" y="80" width="320" height="300" rx="12" fill="url(#hologram)" stroke="rgba(0,229,255,0.25)"/>
    <rect x="420" y="80" width="320" height="300" rx="12" fill="url(#scanlines)" opacity="0.4"/>
    <rect x="420" y="80" width="320" height="300" rx="12" fill="none" stroke="#00e5ff" stroke-width="1" stroke-dasharray="8 6" opacity="0.5"/>

    <text x="450" y="120" fill="#00e5ff" font-family="Songti SC, serif" font-size="16" filter="url(#glow)">Observer</text>

    <text x="450" y="165" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="14">城市当前处于宁静期。</text>
    <text x="450" y="190" fill="#a0a4b0" font-family="Inter, sans-serif" font-size="12">CPU 与网络活动均低于阈值。</text>

    <line x1="450" y1="220" x2="710" y2="220" stroke="rgba(0,229,255,0.15)"/>

    <text x="450" y="255" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="11">NOTE 01</text>
    <text x="450" y="280" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="13">chrome.exe 今日首次</text>
    <text x="450" y="302" fill="#f2f4f8" font-family="Inter, sans-serif" font-size="13">突破 30% 能耗。</text>

    <text x="450" y="345" fill="#a0a4b0" font-family="SF Mono, monospace" font-size="11">SUGGESTION</text>
    <text x="450" y="370" fill="#4aa8ff" font-family="Inter, sans-serif" font-size="13">聚焦该建筑查看详情 →</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c6070"/>
    </marker>
  </defs>
</svg>
